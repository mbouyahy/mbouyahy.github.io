name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger on push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'  # Specify the Node.js version you are using

    - name: Install dependencies
      run: npm ci  # Use 'npm ci' for a clean install in CI/CD

    - name: Set up Git configuration
      run: |
        git config --global user.name "mbouyahy"
        git config --global user.email "mourad.bh06@gmail.com"

    - name: Build the app
      run: npm run build  # Build the production version of the app

    - name: Deploy to GitHub Pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Ensure the secret is correctly set as GITHUB_TOKEN
      run: |
        # Ensure the GitHub Pages branch is set up with the token for authentication
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        npm run deploy  # Deploy to the gh-pages branch